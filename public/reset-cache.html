<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reinitialisation KoulooFit</title>
    <style>
      :root {
        color-scheme: dark;
        background: #070a12;
        color: #f8fbff;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(0, 229, 255, 0.16), transparent 32rem),
          #070a12;
      }

      main {
        width: min(420px, calc(100% - 32px));
        padding: 24px;
        border: 1px solid rgba(0, 229, 255, 0.35);
        border-radius: 8px;
        background: rgba(13, 18, 32, 0.92);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #a7b3c7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>KoulooFit</h1>
      <p>Nettoyage du cache local en cours...</p>
    </main>
    <script>
      async function resetKoulooFit() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        window.location.replace("/?fresh=" + Date.now());
      }

      resetKoulooFit();
    </script>
  </body>
</html>
